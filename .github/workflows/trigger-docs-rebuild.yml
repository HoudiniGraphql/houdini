name: Trigger docs rebuild

on:
  push:
    branches: [main]
    tags:
      - 'svelte-v*'
      - 'react-v*'
      - 'houdini-v*'
      - 'create-houdini-v*'
    paths:
      - 'docs/**'
      - 'packages/*/CHANGELOG.md'

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.DOCS_SITE_TOKEN }}
          script: |
            await github.rest.repos.createDispatchEvent({
              owner: 'HoudiniGraphql',
              repo: 'houdinigraphql.com',
              event_type: 'docs-updated',
              client_payload: {
                ref: context.ref,
                sha: context.sha,
              },
            })
