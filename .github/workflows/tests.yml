name: CI Checks

on:
    pull_request:
        paths:
            - '**'
    push:
        branches:
            - 'main'

env:
    PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/ms-playwright

jobs:
    verify_changesets:
        name: Verify Changeset Consistency
        runs-on: ubuntu-latest
        if: github.event_name == 'pull_request'
        steps:
            - uses: actions/checkout@v3
              with:
                  fetch-depth: 0
            - name: Check houdini-core changesets include houdini
              run: |
                  FAILED=0
                  ADDED=$(git diff --name-only --diff-filter=A "origin/${{ github.base_ref }}...HEAD" -- '.changeset/*.md' | grep -v 'README.md' || true)

                  if [ -z "$ADDED" ]; then
                    echo "No new changeset files."
                    exit 0
                  fi

                  while IFS= read -r file; do
                    [ -z "$file" ] && continue
                    frontmatter=$(awk '/^---$/{f++; if(f==2) exit; next} f==1{print}' "$file")
                    if echo "$frontmatter" | grep -qE "^('houdini-core'|\"houdini-core\"):"; then
                      if ! echo "$frontmatter" | grep -qE "^('houdini'|\"houdini\"):"; then
                        echo "::error file=$file::Changeset bumps houdini-core without bumping houdini. Every houdini-core bump must include a houdini bump so consumers pick it up."
                        FAILED=1
                      fi
                    fi
                  done <<< "$ADDED"

                  exit $FAILED

    format:
        name: Format
        runs-on: ubuntu-latest
        if: github.event_name == 'pull_request'
        permissions:
            contents: write
        steps:
            - uses: actions/checkout@v3
              with:
                  ref: ${{ github.head_ref }}
                  token: ${{ secrets.GITHUB_TOKEN }}
            - uses: actions/setup-node@v3
              with:
                node-version: 24.9.0
            - uses: pnpm/action-setup@v4.1.0
            - name: Get pnpm store directory
              id: pnpm-cache
              run: echo "dir=$(pnpm store path)" >> $GITHUB_OUTPUT
            - uses: actions/cache@v3
              with:
                path: ${{ steps.pnpm-cache.outputs.dir }}
                key: pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
                restore-keys: pnpm-
            - run: pnpm install --frozen-lockfile --prefer-offline
            - run: pnpm run format
            - name: Commit formatting fixes (same-repo PR)
              if: github.event.pull_request.head.repo.full_name == github.repository
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  git add -A
                  git diff --staged --quiet || git commit -m "style: auto-format"
                  git push
            - name: Fail if formatting needed (fork PR)
              if: github.event.pull_request.head.repo.full_name != github.repository
              run: git diff --quiet || (echo "::error::Run 'pnpm format' locally to fix formatting." && exit 1)

    tests:
        name: Unit Tests
        runs-on: ubuntu-latest
        needs: [format]
        if: always()
        steps:
            - uses: actions/checkout@v3
              with:
                  ref: ${{ github.head_ref || github.sha }}
            - uses: actions/setup-node@v3
              with:
                node-version: 24.9.0
            - uses: actions/setup-go@v4
              with:
                  go-version: '1.23.2'
                  cache: true
            - uses: pnpm/action-setup@v4.1.0
            - name: Get pnpm store directory
              id: pnpm-cache
              run: echo "dir=$(pnpm store path)" >> $GITHUB_OUTPUT
            - uses: actions/cache@v3
              with:
                path: ${{ steps.pnpm-cache.outputs.dir }}
                key: pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
                restore-keys: pnpm-
            - run: pnpm install --frozen-lockfile --prefer-offline
            - run: pnpm run build
            - run: find ./packages -path "*/bin/houdini-*" -type f | xargs chmod +x 2>/dev/null || true
            - run: pnpm run tests
            - name: Unit tests (e2e-react / createMock)
              run: pnpm --filter e2e-react unit

    go_tests:
        name: Go Tests
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v3
            - uses: actions/setup-go@v4
              with:
                  go-version: '1.23.2'
                  cache: true
            - run: go test ./... -v -timeout 15m

    verify_init:
        name: Verify Init
        runs-on: ubuntu-latest
        needs: [format]
        if: always()
        steps:
            - uses: actions/checkout@v3
              with:
                  ref: ${{ github.head_ref || github.sha }}
            - uses: actions/setup-node@v3
              with:
                node-version: 24.9.0
            - uses: actions/setup-go@v4
              with:
                  go-version: '1.23.2'
                  cache: true
            - uses: pnpm/action-setup@v4.1.0
            - name: Get pnpm store directory
              id: pnpm-cache
              run: echo "dir=$(pnpm store path)" >> $GITHUB_OUTPUT
            - uses: actions/cache@v3
              with:
                path: ${{ steps.pnpm-cache.outputs.dir }}
                key: pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
                restore-keys: pnpm-
            - run: pnpm install --frozen-lockfile --prefer-offline
            - run: pnpm run build
            - run: find ./packages -path "*/bin/houdini-*" -type f | xargs chmod +x 2>/dev/null || true
            - run: pnpm dlx sv@0.6 create project --types ts --template demo --no-add-ons --no-install
            - run: cd project && node ../packages/houdini/build/cmd/index.js init -y

    e2e_tests:
        name: End-to-End Tests
        runs-on: ubuntu-latest
        needs: [format]
        if: always()
        strategy:
            matrix:
                framework: [e2e-kit, e2e-react]
        steps:
            - uses: actions/checkout@v3
              with:
                  ref: ${{ github.head_ref || github.sha }}
            - uses: actions/setup-node@v3
              with:
                node-version: 24.9.0
            - uses: actions/setup-go@v4
              with:
                  go-version: '1.23.2'
                  cache: true
            - uses: pnpm/action-setup@v4.1.0
            - name: Get pnpm store directory
              id: pnpm-cache
              run: echo "dir=$(pnpm store path)" >> $GITHUB_OUTPUT
            - uses: actions/cache@v3
              with:
                path: ${{ steps.pnpm-cache.outputs.dir }}
                key: pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
                restore-keys: pnpm-
            - run: pnpm install --frozen-lockfile --prefer-offline
            - run: pnpm run build
            - run: find ./packages -path "*/bin/houdini-*" -type f | xargs chmod +x 2>/dev/null || true
            - if: matrix.framework == 'e2e-kit'
              run: pnpm --filter e2e-kit exec svelte-kit sync
            - name: Get Playwright version
              id: playwright-version
              run: echo "version=$(node -e "process.stdout.write(require('@playwright/test/package.json').version)")" >> $GITHUB_OUTPUT
            - uses: actions/cache@v3
              id: playwright-cache
              with:
                key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version }}
                path: ${{ env.PLAYWRIGHT_BROWSERS_PATH }}
            - if: steps.playwright-cache.outputs.cache-hit != 'true'
              run: pnpm playwright install --with-deps
            - if: matrix.framework == 'e2e-kit'
              run: pnpm run --filter ${{ matrix.framework }} build && pnpm --filter ${{ matrix.framework }} tests
            - if: matrix.framework == 'e2e-react'
              run: pnpm --filter ${{ matrix.framework }} tests

    verify_generate:
        name: Verify Generate
        runs-on: ubuntu-latest
        needs: [format]
        if: always()
        strategy:
            matrix:
                framework: [e2e-react, e2e-kit]
        steps:
            - uses: actions/checkout@v3
              with:
                  ref: ${{ github.head_ref || github.sha }}
            - uses: actions/setup-node@v3
              with:
                node-version: 24.9.0
            - uses: actions/setup-go@v4
              with:
                  go-version: '1.23.2'
                  cache: true
            - uses: pnpm/action-setup@v4.1.0
            - name: Get pnpm store directory
              id: pnpm-cache
              run: echo "dir=$(pnpm store path)" >> $GITHUB_OUTPUT
            - uses: actions/cache@v3
              with:
                path: ${{ steps.pnpm-cache.outputs.dir }}
                key: pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
                restore-keys: pnpm-
            - run: pnpm install --frozen-lockfile --prefer-offline
            - run: pnpm run build
            - run: find ./packages -path "*/bin/houdini-*" -type f | xargs chmod +x 2>/dev/null || true
            - run: pnpm --filter ${{ matrix.framework }} compile:generate

    verify_protocols:
        name: Verify Plugin Protocols
        runs-on: ubuntu-latest
        needs: [format]
        if: always()
        strategy:
            matrix:
                protocol: [websocket, stdio]
        steps:
            - uses: actions/checkout@v3
              with:
                  ref: ${{ github.head_ref || github.sha }}
            - uses: actions/setup-node@v3
              with:
                node-version: 24.9.0
            - uses: actions/setup-go@v4
              with:
                  go-version: '1.23.2'
                  cache: true
            - uses: pnpm/action-setup@v4.1.0
            - name: Get pnpm store directory
              id: pnpm-cache
              run: echo "dir=$(pnpm store path)" >> $GITHUB_OUTPUT
            - uses: actions/cache@v3
              with:
                path: ${{ steps.pnpm-cache.outputs.dir }}
                key: pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
                restore-keys: pnpm-
            - run: pnpm install --frozen-lockfile --prefer-offline
            - run: pnpm run build
            - run: find ./packages -path "*/bin/houdini-*" -type f | xargs chmod +x 2>/dev/null || true
            - name: Generate (${{ matrix.protocol }})
              run: pnpm --filter e2e-kit generate
              env:
                HOUDINI_PLUGIN_TRANSPORT: ${{ matrix.protocol }}

    linter:
        name: Linter & Type Check
        runs-on: ubuntu-latest
        needs: [format]
        if: always()
        strategy:
            matrix:
                framework: [e2e-kit, e2e-react]
        steps:
            - uses: actions/checkout@v3
              with:
                  ref: ${{ github.head_ref || github.sha }}
            - uses: actions/setup-node@v3
              with:
                node-version: 24.9.0
            - uses: actions/setup-go@v4
              with:
                  go-version: '1.23.2'
                  cache: true
            - uses: pnpm/action-setup@v4.1.0
            - name: Get pnpm store directory
              id: pnpm-cache
              run: echo "dir=$(pnpm store path)" >> $GITHUB_OUTPUT
            - uses: actions/cache@v3
              with:
                path: ${{ steps.pnpm-cache.outputs.dir }}
                key: pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
                restore-keys: pnpm-
            - run: pnpm install --frozen-lockfile --prefer-offline
            - run: pnpm run build
            - run: find ./packages -path "*/bin/houdini-*" -type f | xargs chmod +x 2>/dev/null || true
            - run: pnpm --filter ${{ matrix.framework }} run build
            - run: pnpm --filter ${{ matrix.framework }} run lint
            - run: pnpm --filter ${{ matrix.framework }} run check
