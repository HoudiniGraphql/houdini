name: Release

# Trigger releases on pushes to release branches
# Supports both regular releases and prereleases based on .changeset/pre.json
on:
    push:
        branches:
            - houdini-2.0
            - main

env:
    CI: true
jobs:
    publish:
        name: Publish Release Version
        runs-on: ubuntu-22.04
        permissions:
          id-token: write  
          contents: write  
          pull-requests: write
        steps:
            - name: Checkout source
              uses: actions/checkout@master
              with:
                  ref: ${{ github.ref }}

            - name: Install Node.js
              uses: actions/setup-node@v4
              with:
                node-version: 24
                registry-url: 'https://registry.npmjs.org'
                always-auth: true

            - name: Update npm CLI
              run: npm install -g npm@latest # Ensure npm 11.5.1 or later

            - uses: pnpm/action-setup@v2.0.1
              name: Install pnpm
              id: pnpm-install
              with:
                version: 9

            - name: Install dependencies
              run: pnpm install

            - name: Set Git Identity
              run: |
                  git config --global user.name 'github-actions[bot]'
                  git config --global user.email 'github-actions[bot]@users.noreply.github.com'
                  git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/$GITHUB_REPOSITORY
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            # Check if we're in prerelease mode
            - name: Check prerelease mode
              id: prerelease-check
              run: |
                  if [ -f ".changeset/pre.json" ]; then
                    echo "✅ Prerelease mode detected (.changeset/pre.json exists)"
                    echo "📝 Will use prerelease titles and skip snapshot releases"
                    echo "is_prerelease=true" >> $GITHUB_OUTPUT
                    echo "title=🚧 Prerelease Version Update" >> $GITHUB_OUTPUT
                    echo "commit=🚧 v{VERSION}" >> $GITHUB_OUTPUT
                  else
                    echo "✅ Regular release mode detected (no .changeset/pre.json)"
                    echo "📝 Will use regular titles and publish snapshot releases"
                    echo "is_prerelease=false" >> $GITHUB_OUTPUT
                    echo "title=📦 Release Version Update" >> $GITHUB_OUTPUT
                    echo "commit=📦 v{VERSION}" >> $GITHUB_OUTPUT
                  fi

            # Regular changesets release workflow - creates PR or publishes when PR is merged
            - name: Create Release Pull Request if necessary
              id: changesets
              uses: changesets/action@v1
              with:
                  version: pnpm run version
                  title: ${{ steps.prerelease-check.outputs.title }}
                  commit: ${{ steps.prerelease-check.outputs.commit }}
                  createGithubReleases: true
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  NPM_CONFIG_PROVENANCE: true 

            - name: Publish Package
              if: steps.changesets.outputs.hasChangesets == 'false'
              run: pnpm run release
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  NPM_CONFIG_PROVENANCE: true
                  # OIDC token is automatically provided by GitHub Actions
