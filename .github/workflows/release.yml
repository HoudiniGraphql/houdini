name: Release

# Trigger releases on pushes to release branches
# Supports both regular releases and prereleases based on .changeset/pre.json
on:
    workflow_run:
        workflows: ["CI Checks"]
        types: [completed]
        branches:
            - houdini-2.0
            - go
            - main

env:
    CI: true
    GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
jobs:
    publish:
        name: Publish Release Version
        runs-on: ubuntu-22.04
        if: ${{ github.event.workflow_run.conclusion == 'success' }}
        environment: production  # requires manual approval before secrets are issued
        permissions:
          id-token: write
          contents: write
          pull-requests: write
        steps:
            - name: Checkout source
              uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
              with:
                  ref: ${{ github.event.workflow_run.head_sha }}

            - name: Install Node.js
              uses: actions/setup-node@v4
              with:
                node-version: 24
                registry-url: 'https://registry.npmjs.org'
                always-auth: true

            - name: Update npm CLI
              run: npm install -g npm@11.16.0

            - uses: pnpm/action-setup@v4.1.0
              name: Install pnpm
              id: pnpm-install

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Set Git Identity
              run: |
                  git config --global user.name 'github-actions[bot]'
                  git config --global user.email 'github-actions[bot]@users.noreply.github.com'
                  git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/$GITHUB_REPOSITORY
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            # Check if we're in prerelease mode
            - name: Check prerelease mode
              id: prerelease-check
              run: |
                  if [ -f ".changeset/pre.json" ]; then
                    echo "✅ Prerelease mode detected (.changeset/pre.json exists)"
                    echo "📝 Will use prerelease titles and skip snapshot releases"
                    echo "is_prerelease=true" >> $GITHUB_OUTPUT
                    echo "title=🚧 Prerelease Version Update" >> $GITHUB_OUTPUT
                    echo "commit=🚧 Version Packages" >> $GITHUB_OUTPUT
                  else
                    echo "✅ Regular release mode detected (no .changeset/pre.json)"
                    echo "📝 Will use regular titles and publish snapshot releases"
                    echo "is_prerelease=false" >> $GITHUB_OUTPUT
                    echo "title=📦 Release Version Update" >> $GITHUB_OUTPUT
                    echo "commit=📦 Version Packages" >> $GITHUB_OUTPUT
                  fi

            # Per-commit snapshot release - only runs when NOT in prerelease mode
            # - name: Publish per-commit snapshot release
            #   if: steps.prerelease-check.outputs.is_prerelease == 'false'
            #   run: |
            #       # Generate unique snapshot version based on commit
            #       COMMIT_SHA=$(git rev-parse --short HEAD)
            #       SNAPSHOT_TAG="commit-${COMMIT_SHA}"
            #       echo "Publishing snapshot release with tag: $SNAPSHOT_TAG"
            #
            #       # Create a clean working directory for snapshot
            #       git stash --include-untracked || true
            #
            #       # Apply snapshot version to all packages
            #       pnpm changeset version --snapshot $SNAPSHOT_TAG
            #
            #       # Build all packages
            #       pnpm run build
            #
            #       # Publish snapshot using comprehensive release script
            #       echo "Publishing snapshot packages with release script..."
            #       node packages/_scripts/release.js --snapshot --tag=$SNAPSHOT_TAG
            #
            #       # Restore working directory
            #       git reset --hard HEAD
            #       git stash pop || true
            #   env:
            #       GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
            #       NPM_CONFIG_PROVENANCE: true  # Disabled for initial publish of new packages

            # Regular changesets release workflow - creates PR or publishes when PR is merged
            - name: Create Release Pull Request if necessary
              id: changesets
              uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d  # v1.9.0
              with:
                  version: pnpm run version
                  title: ${{ steps.prerelease-check.outputs.title }}
                  commit: ${{ steps.prerelease-check.outputs.commit }}
                  createGithubReleases: true
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  NPM_CONFIG_PROVENANCE: true 

            - name: Publish Package
              if: steps.changesets.outputs.hasChangesets == 'false'
              run: pnpm run release
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  NPM_CONFIG_PROVENANCE: true
                  # OIDC token is automatically provided by GitHub Actions
