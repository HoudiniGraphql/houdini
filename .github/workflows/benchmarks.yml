name: Cache Benchmarks

on:
    pull_request:
        paths:
            - 'packages/houdini/src/runtime/cache/**'

jobs:
    benchmark:
        name: Benchmark
        runs-on: ubuntu-latest
        permissions:
            contents: read
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - uses: actions/setup-node@v4
              with:
                  node-version: 24.9.0

            - uses: pnpm/action-setup@v4.1.0

            - name: Get pnpm store directory
              id: pnpm-cache
              run: echo "dir=$(pnpm store path)" >> $GITHUB_OUTPUT

            - uses: actions/cache@v4
              with:
                  path: ${{ steps.pnpm-cache.outputs.dir }}
                  key: pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
                  restore-keys: pnpm-

            # ── PR branch ────────────────────────────────────────────────────
            - run: pnpm install --frozen-lockfile --prefer-offline

            - name: Benchmark PR branch (run 1/3)
              run: npx vitest bench packages/houdini/src/runtime/cache/benchmarks/ --outputJson /tmp/pr-1.json

            - name: Benchmark PR branch (run 2/3)
              run: npx vitest bench packages/houdini/src/runtime/cache/benchmarks/ --outputJson /tmp/pr-2.json

            - name: Benchmark PR branch (run 3/3)
              run: npx vitest bench packages/houdini/src/runtime/cache/benchmarks/ --outputJson /tmp/pr-3.json

            - name: Merge PR runs (median)
              run: node perf/merge.js /tmp/benchmark.current.json /tmp/pr-1.json /tmp/pr-2.json /tmp/pr-3.json

            # ── Base branch ──────────────────────────────────────────────────
            - name: Checkout base branch
              run: git checkout ${{ github.base_ref }}

            - run: pnpm install --frozen-lockfile --prefer-offline

            - name: Benchmark base branch (run 1/3)
              run: npx vitest bench packages/houdini/src/runtime/cache/benchmarks/ --outputJson /tmp/base-1.json

            - name: Benchmark base branch (run 2/3)
              run: npx vitest bench packages/houdini/src/runtime/cache/benchmarks/ --outputJson /tmp/base-2.json

            - name: Benchmark base branch (run 3/3)
              run: npx vitest bench packages/houdini/src/runtime/cache/benchmarks/ --outputJson /tmp/base-3.json

            - name: Merge base runs (median)
              run: node perf/merge.js /tmp/benchmark.baseline.json /tmp/base-1.json /tmp/base-2.json /tmp/base-3.json

            # ── Compare ──────────────────────────────────────────────────────
            - name: Checkout PR branch
              run: git checkout ${{ github.head_ref }}

            - name: Compare
              run: node perf/compare.js /tmp/benchmark.baseline.json /tmp/benchmark.current.json
